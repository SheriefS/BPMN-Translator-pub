<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPMN to CSV Converter & ChatGPT Analysis</title>
</head>
<body>
    <h1>BPMN to CSV Converter & ChatGPT Analysis</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
        {% for category, message in messages %}
          <li style="color: {% if category == 'error' %}red{% else %}green{% endif %};">{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('convert') }}" method="POST" enctype="multipart/form-data">
        <label for="input_file">BPMN File:</label>
        <input type="file" id="input_file" name="input_file" accept=".bpmn">
        <br><br>
        <label for="output_file">Output CSV:</label>
        <input type="text" id="output_file" name="output_file" placeholder="output.csv">
        <br><br>
        <button type="submit">Convert</button>
    </form>

    <h2>Send CSV to ChatGPT</h2>
    <form action="{{ url_for('send_to_chatgpt_route') }}" method="POST" enctype="multipart/form-data">
        <label for="csv_file">CSV File:</label>
        <input type="file" id="csv_file" name="csv_file" accept=".csv">
        <br><br>
        <label for="output_txt_file">Output TXT:</label>
        <input type="text" id="output_txt_file" name="output_txt_file" placeholder="output.txt">
        <br><br>
        <button type="submit">Send to ChatGPT</button>
    </form>
</body>
</html>
